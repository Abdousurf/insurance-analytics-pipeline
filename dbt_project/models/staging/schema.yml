version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: policies
        description: Polices d'assurance brutes issues du générateur de données synthétiques
      - name: claims
        description: Sinistres bruts avec données de réserves et de paiements
      - name: contracts
        description: Traités de réassurance

models:
  - name: stg_policies
    description: "Polices d'assurance nettoyées et typées"
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique
      - name: annual_premium_eur
        tests:
          - not_null
      - name: line_of_business
        tests:
          - not_null
          - accepted_values:
              values: ["auto", "home", "liability", "health"]
      - name: inception_date
        tests:
          - not_null

  - name: stg_claims
    description: "Sinistres nettoyés et validés"
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique
      - name: policy_id
        tests:
          - not_null
      - name: ultimate_cost_eur
        tests:
          - not_null
      - name: line_of_business
        tests:
          - not_null
          - accepted_values:
              values: ["auto", "home", "liability", "health"]

  - name: stg_contracts
    description: "Contrats de réassurance normalisés"
    columns:
      - name: contract_id
        tests:
          - not_null
          - unique
      - name: line_of_business
        tests:
          - not_null
