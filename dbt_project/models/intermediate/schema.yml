version: 2

models:
  - name: int_claims_enriched
    description: "Sinistres enrichis avec les attributs de la police pour l'analyse"
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique
      - name: policy_id
        tests:
          - not_null

  - name: int_portfolio
    description: "Agrégation du portefeuille par segment avec informations de réassurance"
    columns:
      - name: line_of_business
        tests:
          - not_null
