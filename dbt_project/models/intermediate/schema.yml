version: 2

models:
  - name: int_claims_enriched
    description: "Claims enriched with policy-level attributes for analysis"
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique
      - name: policy_id
        tests:
          - not_null

  - name: int_portfolio
    description: "Portfolio aggregation by segment with reinsurance info"
    columns:
      - name: line_of_business
        tests:
          - not_null
